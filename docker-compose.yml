services:
  reel-ingest:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - VAULT_RAW_DIR=/vault/raw
      - INSTAGRAM_SUBDIR=${INSTAGRAM_SUBDIR}
      - WHISPER_MODE=${WHISPER_MODE}
      - WHISPER_MODEL=${WHISPER_MODEL}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE}
      - WHISPER_API_KEY=${WHISPER_API_KEY}
    volumes:
      - ./scripts:/home/node/scripts
      # Host path to your vault's raw/ folder -> mounted as /vault/raw in the container.
      # Long syntax handles the space and drive-letter colon in the Windows path.
      - type: bind
        source: ${VAULT_HOST_PATH}
        target: /vault/raw
      # Persist downloaded Whisper models between container rebuilds
      - whisper-cache:/home/node/.cache

  # ngrok runs in-container on purpose: container egress is not intercepted by
  # the host's AV TLS scanning, and it now starts/stops with the project.
  # Forwards the public domain to the (separately running) n8n on the host.
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: ["http", "host.docker.internal:5678", "--url=${NGROK_DOMAIN}"]
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4040:4040"

volumes:
  whisper-cache:
